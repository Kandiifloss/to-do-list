<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List by naknem&Kandiifloss</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header> To Do list by greatest Kandiifloss</header>
    <main>
        <div id="adder">
            <label for="input">Задача:</label>
            <input type="text" name="input" id="input">
            <button id="submitBtn">Добавить</button>
            <button id="saveBtn">Сохранить</button>
        </div>

        <div id="board">
            <section id="planing" class="tasks_section">
                <h2>Запланированные задачи</h2>
                <ol id="planing_tasks">
                    
                </ol>

            </section>
            <section id="doing" class="tasks_section">
                <h2>В процессе</h2>
                <ol id="doing_tasks">
                    
                </ol>
            </section>
            <section id="did" class="tasks_section">
                <h2>Выполнено</h2>
                <ol id="did_tasks">
                    
                </ol>
            </section>
            
        </div>

    </main>
    
    <footer>


    </footer>

    <script src="index.js"></script>
</body>
</html>
